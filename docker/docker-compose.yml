# Docker Compose 配置文件
# 用于启动 PostgreSQL 和 Redis 服务

version: '3.8'

services:
  # 1. PostgreSQL 数据库服务 (方案要求: PG 14+)
  postgres:
    image: postgres:14-alpine
    container_name: game_cs_postgres
    environment:
      POSTGRES_USER: user        # 数据库用户名
      POSTGRES_PASSWORD: password  # 数据库密码
      POSTGRES_DB: game_cs_db    # 数据库名称
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # 2. Redis 缓存/队列服务 (方案要求: Redis 7+)
  redis:
    image: redis:7-alpine
    container_name: game_cs_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

# 定义卷 (Volumes) 以防止数据丢失
volumes:
  pgdata:
  redisdata: